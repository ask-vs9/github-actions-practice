name: Explore Pre-installed Tools

on:
  push:

jobs:
  explore-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Docker Version
        run: docker --version

      - name: Show Python Version
        run: python3 --version

      - name: Show Node Version
        run: node --version

      - name: Show Git Version
        run: git --version
